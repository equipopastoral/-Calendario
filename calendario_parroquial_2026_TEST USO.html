<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Parroquial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--rojo:#c0392b;--rojo-osc:#7b1a13;--azul:#1a3a5c;--crema:#fdf6ed;--gris:#6b7280;--borde:#e8ddd0;--sombra:rgba(120,40,20,0.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--crema);color:#2d2d2d;min-height:100vh}
header{background:linear-gradient(135deg,var(--rojo-osc) 0%,var(--rojo) 60%,#a93226 100%);color:white;padding:1.2rem 1rem;text-align:center}
.header-inner{display:flex;align-items:center;justify-content:center;gap:1rem}
.logo-img{width:70px;height:70px;border-radius:50%;border:3px solid rgba(255,255,255,0.5);object-fit:cover;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.header-text h1{font-family:'Cinzel',serif;font-size:clamp(1rem,4vw,1.6rem);font-weight:700;letter-spacing:.04em;text-shadow:0 2px 6px rgba(0,0,0,0.3)}
.header-text p{font-size:.75rem;font-weight:300;letter-spacing:.1em;opacity:.85;text-transform:uppercase;margin-top:.15rem}
.month-nav{background:white;border-bottom:2px solid var(--borde);overflow-x:auto;scrollbar-width:none}
.month-nav::-webkit-scrollbar{display:none}
.month-tabs{display:flex;min-width:max-content;padding:0 .5rem}
.month-tab{padding:.7rem 1rem;font-family:'Cinzel',serif;font-size:.72rem;font-weight:600;letter-spacing:.06em;color:var(--gris);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;text-transform:uppercase}
.month-tab:hover{color:var(--rojo)}
.month-tab.active{color:var(--rojo);border-bottom-color:var(--rojo)}
.badge{background:var(--rojo);color:white;border-radius:10px;font-size:.6rem;padding:1px 6px;margin-left:4px;font-family:'Lato',sans-serif;font-weight:700}
main{max-width:860px;margin:0 auto;padding:1.2rem .8rem 4rem}
.month-section{display:none}
.month-section.active{display:block}
.month-heading{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--rojo-osc);padding:.5rem 0 .8rem;border-bottom:2px solid var(--borde);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.activity-card{background:white;border-radius:12px;border:1px solid var(--borde);margin-bottom:.75rem;overflow:hidden;box-shadow:0 2px 8px var(--sombra);cursor:pointer;transition:box-shadow .2s,transform .15s}
.activity-card:hover{box-shadow:0 6px 20px var(--sombra);transform:translateY(-1px)}
.activity-card.expanded{box-shadow:0 6px 24px rgba(120,40,20,0.18)}
.card-header{display:flex;align-items:center;gap:.8rem;padding:.85rem 1rem}
.date-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:52px;background:var(--rojo);color:white;border-radius:8px;padding:.4rem .3rem;flex-shrink:0}
.date-badge.cuaresma{background:#6b3a8e}
.date-badge.semanasanta{background:#7d1a1a}
.date-badge.pascua{background:#b8860b}
.date-badge.ordinario{background:#2e7d32}
.date-badge.adviento{background:#4a1a7a}
.date-badge.navidad{background:#c0392b}
.day-name{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.9}
.day-num{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;line-height:1}
.card-info{flex:1;min-width:0}
.card-title{font-family:'Cinzel',serif;font-size:.93rem;font-weight:600;color:#1a1a1a;line-height:1.2}
.card-meta{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.3rem}
.tag{display:inline-flex;align-items:center;gap:.2rem;font-size:.67rem;padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:.03em}
.tag-tipo{background:#f0e8ff;color:#5b21b6}
.tag-hora{background:#fff3e0;color:#e65100}
.tag-pend{background:#fee2e2;color:#991b1b}
.tag-ok{background:#dcfce7;color:#166534}
.countdown{font-size:.67rem;color:var(--gris);margin-top:.22rem}
.countdown.soon{color:#e65100;font-weight:700}
.countdown.past{color:#9ca3af}
.countdown.today{color:var(--rojo);font-weight:700}
.card-arrow{color:var(--gris);transition:transform .3s;flex-shrink:0;font-size:.85rem;margin-left:.2rem}
.activity-card.expanded .card-arrow{transform:rotate(180deg)}
.card-detail{max-height:0;overflow:hidden;transition:max-height .4s ease}
.activity-card.expanded .card-detail{max-height:700px;border-top:1px solid var(--borde)}
.detail-inner{padding:.9rem 1rem 1rem;display:flex;flex-direction:column;gap:.6rem}
.detail-row{display:flex;align-items:flex-start;gap:.6rem;font-size:.84rem}
.detail-icon{font-size:.95rem;flex-shrink:0;margin-top:.05rem}
.detail-label{font-weight:700;color:var(--rojo-osc);min-width:115px;flex-shrink:0;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
.detail-value{color:#3d3d3d;line-height:1.5}
.detail-value.acciones{background:#fff8e1;border-left:3px solid #f59e0b;padding:.5rem .7rem;border-radius:0 6px 6px 0;font-size:.82rem;width:100%}
.pend-si{color:#991b1b;font-weight:700}
.pend-no{color:#166534;font-weight:700}
.notes-section{background:white;border-radius:12px;border:1px solid var(--borde);padding:1rem;margin-bottom:1.2rem;box-shadow:0 2px 8px var(--sombra)}
.notes-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.notes-toggle h3{font-family:'Cinzel',serif;font-size:.88rem;color:var(--azul);display:flex;align-items:center;gap:.5rem}
.notes-body{max-height:0;overflow:hidden;transition:max-height .4s ease,margin-top .2s}
.notes-body.open{max-height:600px;margin-top:.8rem}
.notes-textarea{width:100%;min-height:110px;padding:.7rem;border:1px solid var(--borde);border-radius:8px;font-family:'Lato',sans-serif;font-size:.85rem;resize:vertical;color:#2d2d2d;background:#fafafa;outline:none;transition:border-color .2s}
.notes-textarea:focus{border-color:#2980b9}
.notes-actions{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;align-items:center}
.btn{padding:.42rem .9rem;border:none;border-radius:6px;font-family:'Lato',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.04em}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn-primary{background:var(--azul);color:white}
.btn-danger{background:#fee2e2;color:#991b1b}
.btn-wa{background:#25D366;color:white;display:none;align-items:center;gap:.35rem}
.btn-wa.visible{display:inline-flex}
.btn-wa:hover{background:#1ebe5d;opacity:1}
.saved-note{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:.6rem .8rem;font-size:.82rem;color:#374151;margin-top:.5rem;display:none;line-height:1.5}
.saved-note.visible{display:block}
.note-ts{font-size:.67rem;color:var(--gris);margin-top:.25rem}
.ts-badge{display:inline-flex;align-items:center;gap:.3rem;background:#e0f2fe;color:#0369a1;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:.5rem}
footer{background:var(--rojo-osc);color:rgba(255,255,255,.7);text-align:center;padding:1.2rem 1rem;font-size:.72rem;letter-spacing:.05em}
footer .footer-logo{width:36px;height:36px;border-radius:50%;object-fit:cover;margin:0 auto .5rem;display:block;border:2px solid rgba(255,255,255,.3)}
footer strong{color:white;font-family:'Cinzel',serif}
@media(max-width:480px){.detail-label{min-width:85px;font-size:.7rem}.card-title{font-size:.85rem}}
</style>
</head>

function liturgicoClass(l) {
  if (!l) return "";
  var t = l.toLowerCase();
  if (t.indexOf("cuaresma") >= 0) return "cuaresma";
  if (t.indexOf("semana santa") >= 0) return "semanasanta";
  if (t.indexOf("pascua") >= 0) return "pascua";
  if (t.indexOf("ordinario") >= 0) return "ordinario";
  if (t.indexOf("adviento") >= 0) return "adviento";
  if (t.indexOf("navidad") >= 0) return "navidad";
  return "";
}

function countdown(dateStr) {
  var today = new Date(); today.setHours(0,0,0,0);
  var d = new Date(dateStr + "T00:00:00");
  var diff = Math.round((d - today) / 86400000);
  if (diff === 0) return {text:"Hoy!", cls:"today"};
  if (diff < 0) return {text:"Hace " + Math.abs(diff) + " dia(s)", cls:"past"};
  if (diff <= 30) return {text:"En " + diff + " dias", cls:"soon"};
  return {text:"En " + diff + " dias", cls:""};
}

function fmtDate(s) {
  var d = new Date(s + "T00:00:00");
  return DIAS[d.getDay()] + " " + d.getDate();
}

function switchMonth(mes) {
  var allTabs = document.querySelectorAll(".month-tab");
  var allSecs = document.querySelectorAll(".month-section");
  for (var i = 0; i < allTabs.length; i++) allTabs[i].classList.remove("active");
  for (var i = 0; i < allSecs.length; i++) allSecs[i].classList.remove("active");
  var tab = document.querySelector(".month-tab[data-mes='" + mes + "']");
  var sec = document.getElementById("mes-" + mes);
  if (tab) tab.classList.add("active");
  if (sec) sec.classList.add("active");
}

function toggleNotes(el) {
  var body = el.parentElement.querySelector(".notes-body");
  body.classList.toggle("open");
}

function saveNote(mes) {
  var ta = document.getElementById("nta-" + mes);
  var val = ta.value.trim();
  if (!val) return;
  // Timestamp completo
  var now = new Date();
  var ts = now.toLocaleDateString("es-AR", {weekday:"long", year:"numeric", month:"long", day:"numeric"})
           + " — " + now.toLocaleTimeString("es-AR", {hour:"2-digit", minute:"2-digit"});
  notes["nota_" + mes] = {text: val, ts: ts};
  // Mostrar nota guardada con badge de timestamp
  var saved = document.getElementById("snote-" + mes);
  saved.innerHTML =
    '<div class="ts-badge">&#128336; ' + ts + '</div>' +
    val.replace(/\n/g, "<br>");
  saved.className = "saved-note visible";
  // Mostrar boton WhatsApp
  var waBtn = document.getElementById("wa-btn-" + mes);
  if (waBtn) waBtn.classList.add("visible");
}

function clearNote(mes) {
  var ta = document.getElementById("nta-" + mes);
  ta.value = "";
  delete notes["nota_" + mes];
  var saved = document.getElementById("snote-" + mes);
  saved.innerHTML = "";
  saved.className = "saved-note";
  // Ocultar boton WhatsApp
  var waBtn = document.getElementById("wa-btn-" + mes);
  if (waBtn) waBtn.classList.remove("visible");
}

// ── WHATSAPP ──────────────────────────────────────────────────────────────────
function enviarWA(mes) {
  var nota = notes["nota_" + mes];
  if (!nota) { alert("No hay nota guardada para enviar."); return; }
  var msg = "\u26ea *Equipo Pastoral \u2014 Parroquia Santa Rosa de Lima*\n"
    + "\ud83d\uddd3\ufe0f " + nota.ts + "\n"
    + "\ud83d\udcc5 *" + MESES[mes] + " 2026*\n\n"
    + nota.text + "\n\n"
    + "_Enviado desde el Calendario Parroquial_";
  window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
}
